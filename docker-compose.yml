services:
  backend:
    build: ./backend
    env_file: backend/.env
    volumes:
      - prima_pagina_data:/app/data
    ports:
      - "${BACKEND_PORT:-8800}:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8880}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  prima_pagina_data:
