services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - prima_pagina_data:/app/data
    ports:
      - "8800:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8880:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  prima_pagina_data:
